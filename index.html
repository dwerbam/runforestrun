<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treadmill Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        [v-cloak] { display: none; }
        #map { width: 100%; height: 400px; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-blue-600">RunTracker</h1>
                <p class="text-sm text-gray-500">FTMS Web Bluetooth App</p>
            </div>
            <div id="bt-status" class="flex items-center">
                <span id="bt-status-dot" class="w-3 h-3 rounded-full bg-red-500 mr-2"></span>
                <span id="bt-status-text" class="text-sm font-semibold text-gray-700">Disconnected</span>
            </div>
        </header>

        <!-- Controls -->
        <section class="bg-white rounded-lg shadow p-6 mb-8 flex flex-wrap gap-4 items-center">
            <button id="btn-connect" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                Connect Treadmill
            </button>
            <button id="btn-simulate" class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-4 rounded transition duration-200">
                Simulate Machine
            </button>
            <button id="btn-disconnect" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded transition duration-200 hidden">
                Disconnect
            </button>
            
            <div class="flex-grow border-l pl-4 ml-2 border-gray-200">
                <button id="btn-start-run" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded transition duration-200 opacity-50 cursor-not-allowed" disabled>
                    Start App Recording
                </button>
                <button id="btn-stop-run" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded transition duration-200 hidden">
                    Stop App Recording
                </button>
            </div>
            <div id="run-status-text" class="text-sm font-semibold text-green-600 hidden">
                Recording...
            </div>
        </section>

        <!-- Machine Controls (FTMS Control Point) -->
        <section id="machine-controls" class="bg-white rounded-lg shadow p-6 mb-8 opacity-50 pointer-events-none transition-opacity duration-300">
            <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Treadmill Motor Controls</h2>
            
            <div class="flex flex-wrap gap-4 items-end mb-6">
                <button id="btn-machine-start" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded transition duration-200">
                    ▶ Start Motor
                </button>
                <button id="btn-machine-pause" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-6 rounded transition duration-200">
                    ⏸ Pause Motor
                </button>
                <button id="btn-machine-stop" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded transition duration-200">
                    ⏹ Stop Motor
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Set Speed (km/h)</label>
                    <div class="flex">
                        <input type="number" id="input-speed" step="0.1" min="1.0" max="22.0" value="5.0" class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-l-md px-3 border">
                        <button id="btn-set-speed" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-4 rounded-r-md transition duration-200">
                            Apply
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Set Incline (%)</label>
                    <div class="flex">
                        <input type="number" id="input-incline" step="0.5" min="0" max="15.0" value="0.0" class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-l-md px-3 border">
                        <button id="btn-set-incline" class="bg-gray-800 hover:bg-gray-900 text-white font-bold py-2 px-4 rounded-r-md transition duration-200">
                            Apply
                        </button>
                    </div>
                </div>
            </div>
            <div id="machine-cmd-status" class="mt-3 text-sm text-gray-500 italic"></div>
        </section>

        <!-- Real-Time Metrics -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-lg shadow p-6 text-center border-t-4 border-blue-500">
                <h2 class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Speed</h2>
                <div class="flex items-baseline justify-center">
                    <span id="metric-speed" class="text-3xl font-bold text-gray-900">0.0</span>
                    <span class="text-sm text-gray-500 ml-1">km/h</span>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6 text-center border-t-4 border-green-500">
                <h2 class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Distance</h2>
                <div class="flex items-baseline justify-center">
                    <span id="metric-distance" class="text-3xl font-bold text-gray-900">0.00</span>
                    <span class="text-sm text-gray-500 ml-1">km</span>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6 text-center border-t-4 border-purple-500">
                <h2 class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Time</h2>
                <div class="flex items-baseline justify-center">
                    <span id="metric-time" class="text-3xl font-bold text-gray-900">00:00</span>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6 text-center border-t-4 border-yellow-500">
                <h2 class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Incline / HR</h2>
                <div class="flex items-baseline justify-center">
                    <span id="metric-incline" class="text-3xl font-bold text-gray-900">0</span>
                    <span class="text-sm text-gray-500 mx-1">%</span>
                    <span class="text-gray-400 mx-1">|</span>
                    <span id="metric-hr" class="text-3xl font-bold text-gray-900">--</span>
                    <span class="text-sm text-gray-500 ml-1">bpm</span>
                </div>
            </div>
        </section>

        <!-- Map Visualization -->
        <section class="bg-white rounded-lg shadow overflow-hidden mb-8">
            <div class="px-6 py-4 border-b border-gray-200 flex flex-wrap justify-between items-center gap-2">
                <h2 class="text-lg font-bold text-gray-800">Virtual Run Map</h2>
                <div class="flex items-center flex-wrap gap-2">
                    <label class="text-sm bg-green-100 text-green-800 hover:bg-green-200 py-1 px-3 rounded transition cursor-pointer font-semibold shadow-sm">
                        📁 Load GPX
                        <input type="file" id="input-gpx" accept=".gpx" class="hidden">
                    </label>
                    <button id="btn-toggle-camera" class="text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 py-1 px-3 rounded transition shadow-sm font-medium w-32">
                        📷 2D Map
                    </button>
                </div>
            </div>
            <div id="map"></div>
        </section>

        <!-- History -->
        <section class="bg-white rounded-lg shadow overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-lg font-bold text-gray-800">Session History</h2>
                <button id="btn-clear-history" class="text-sm text-red-500 hover:text-red-700">Clear</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm text-gray-600">
                    <thead class="bg-gray-50 text-gray-700 uppercase">
                        <tr>
                            <th class="px-6 py-3">Date</th>
                            <th class="px-6 py-3">Duration</th>
                            <th class="px-6 py-3">Distance</th>
                            <th class="px-6 py-3">Avg Speed</th>
                            <th class="px-6 py-3">Calories</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody" class="divide-y divide-gray-200">
                        <!-- Rows will be populated by JS -->
                        <tr>
                            <td colspan="5" class="px-6 py-4 text-center text-gray-500 italic">No runs recorded yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="storage.js"></script>
    <script src="app.js"></script>
</body>
</html>
